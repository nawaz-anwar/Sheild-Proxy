name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  proxy-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/proxy-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - run: go vet ./...

  api-nest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-nest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  dashboard-nuxt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard-nuxt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
