worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  limit_req_zone $binary_remote_addr zone=shieldproxy_per_ip:10m rate=20r/s;

  # Placeholder for TLS certs in production
  server {
    listen 80;
    server_name _;

    location /healthz {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      limit_req zone=shieldproxy_per_ip burst=40 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://proxy-go:8080;
    }
  }

  # TLS termination scaffold (enable by mounting cert/key in deployment):
  # server {
  #   listen 443 ssl http2;
  #   server_name _;
  #   ssl_certificate     /etc/nginx/certs/tls.crt;
