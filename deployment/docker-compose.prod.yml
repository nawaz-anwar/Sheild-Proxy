services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shield_proxy
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  proxy-go:
    image: shield-proxy/proxy-go:latest
    restart: unless-stopped
    environment:
      PROXY_HTTP_ADDR: :8080
      PROXY_METRICS_ADDR: :9090
      CONFIG_FILE: /workspace/config/platform.yaml
    volumes:
      - ../config:/workspace/config:ro

  api-nest:
    image: shield-proxy/api-nest:latest
    restart: unless-stopped
    env_file:
      - ../config/platform.env.example

  dashboard-nuxt:
    image: shield-proxy/dashboard-nuxt:latest
    restart: unless-stopped
    environment:
      BACKEND_API_BASE: http://api-nest:3000

  edge-nginx:
    image: openresty/openresty:1.27.1.1-alpine
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - proxy-go

  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - proxy-go
      - api-nest
      - dashboard-nuxt

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
