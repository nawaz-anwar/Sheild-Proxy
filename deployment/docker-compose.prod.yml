services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shield_proxy
      POSTGRES_USER: shield
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # redis_acl secret should define ACL users and passwords, for example:
    # user default on >strong-password ~* +@read +@write +@set +@keyspace -@dangerous
    command: ["redis-server", "--aclfile", "/run/secrets/redis_acl"]
    secrets:
      - redis_password
      - redis_acl
    networks:
      - internal

  proxy-go:
    image: shield-proxy/proxy-go:latest
    restart: unless-stopped
    environment:
      PROXY_HTTP_ADDR: :8080
      PROXY_METRICS_ADDR: :9090
      CONFIG_FILE: /workspace/config/platform.yaml
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      ORIGIN_SECRET_FILE: /run/secrets/origin_secret
      DATABASE_DSN_FILE: /run/secrets/database_dsn
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    volumes:
      - ../config:/workspace/config:ro
    secrets:
      - jwt_secret
      - origin_secret
      - database_dsn
      - redis_password
    networks:
      - internal

  api-nest:
    image: shield-proxy/api-nest:latest
    restart: unless-stopped
    env_file:
      - ../config/platform.env.example
    environment:
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      DATABASE_DSN_FILE: /run/secrets/database_dsn
    secrets:
      - jwt_secret
      - database_dsn
    networks:
      - internal

  dashboard-nuxt:
    image: shield-proxy/dashboard-nuxt:latest
    restart: unless-stopped
    environment:
      BACKEND_API_BASE: http://api-nest:3000
    networks:
      - internal

  edge-nginx:
    image: openresty/openresty:1.27.1.1-alpine
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - proxy-go
    networks:
      - public
      - internal

  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - proxy-go
      - api-nest
      - dashboard-nuxt
    networks:
      - public
      - internal

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    secrets:
      - grafana_admin_password
    networks:
      - public
      - internal

secrets:
  postgres_password:
    external: true
  redis_password:
    external: true
  redis_acl:
    external: true
  jwt_secret:
    external: true
  origin_secret:
    external: true
  database_dsn:
    external: true
  grafana_admin_password:
    external: true

networks:
  public:
  internal:
    internal: true
