services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shield_proxy
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  proxy-go:
    build:
      context: ../services/proxy-go
    environment:
      PROXY_HTTP_ADDR: :8080
      PROXY_METRICS_ADDR: :9090
      CONFIG_FILE: /workspace/config/platform.yaml
    volumes:
      - ../config:/workspace/config:ro
    ports:
      - "8080:8080"
      - "9090:9090"

  api-nest:
    build:
      context: ../services/api-nest
    env_file:
      - ../config/platform.env.example
    ports:
      - "3000:3000"

  dashboard-nuxt:
    build:
      context: ../services/dashboard-nuxt
    ports:
      - "3001:3001"

  edge-nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - proxy-go
