services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shield_proxy
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  proxy:
    build:
      context: ./services/proxy-go
    environment:
      PROXY_HTTP_ADDR: :8080
      PROXY_METRICS_ADDR: :9090
      CONFIG_FILE: /workspace/config/platform.yaml
    volumes:
      - ./config:/workspace/config:ro
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      - redis
      - postgres

  api:
    build:
      context: ./services/api-nest
    environment:
      API_PORT: 3000
      DATABASE_DSN: postgresql://shield:shield@postgres:5432/shield_proxy
      JWT_SECRET: shield-local-dev-secret-minimum-32-characters-required
      ORIGIN_SECRET: origin-local-dev-secret-minimum-32-characters-required
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ./services/dashboard-nuxt
    environment:
      NUXT_BACKEND_API_BASE: http://api:3000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - api
      - proxy
